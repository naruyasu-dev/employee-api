# ===============================
# アプリケーション基本設定
# ===============================

# アプリケーション名（ログや管理で使用）
spring.application.name=employee-api

# 起動ポート（http://localhost:8080 でアクセス）
server.port=8080


# ===============================
# ログ設定（デバッグ用）
# ===============================

# Spring MVC のリクエスト処理ログ
logging.level.org.springframework.web=DEBUG

# JSON変換の詳細ログ（リクエスト/レスポンス確認に便利）
logging.level.org.springframework.http.converter.json=DEBUG


# ===============================
# データベース設定（MySQL）
# ===============================

# DB接続URL
# useSSL=false : SSL無効（ローカル用）
# serverTimezone : タイムゾーン指定
# allowPublicKeyRetrieval=true : MySQL接続エラー対策
spring.datasource.url=jdbc:mysql://localhost:3306/employee_db?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true

# DBユーザー名
spring.datasource.username=root

# DBパスワード
spring.datasource.password=root

# MySQLドライバ
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# MyBatis設定
# ===============================

# Mapper XML の場所
# classpath:mappers/*.xml → resources/mappers 配下
mybatis.mapper-locations=classpath:mappers/*.xml

# エンティティのパッケージ
# フルクラス名を書かなくてよくなる
mybatis.type-aliases-package=com.example.employee_api

# DBカラムのスネークケース → Javaのキャメルケース変換
# 例: employee_name → employeeName
mybatis.configuration.map-underscore-to-camel-case=true