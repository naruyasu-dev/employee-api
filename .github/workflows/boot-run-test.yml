name: Boot Run Test

on:
  workflow_dispatch:

jobs:
  run-jar:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - run: mvn clean package

      - run: java -jar target/employee-api.war