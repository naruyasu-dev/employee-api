name: Boot Run Test

on:
  workflow_dispatch:

jobs:
  run-jar:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build
        run: mvn clean package

      - name: Run application
        run: java -Dspring.profiles.active=github -jar target/employee-api.war