name: CD (Tomcat Deploy)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build WAR
        run: mvn clean package

      - name: Download Tomcat
        run: |
          curl -L -o tomcat.zip https://archive.apache.org/dist/tomcat/tomcat-10/v10.1.36/bin/apache-tomcat-10.1.36-windows-x64.zip
          tar -xf tomcat.zip
        shell: cmd

      - name: Deploy WAR to Tomcat as ROOT
        run: copy target\*.war apache-tomcat-10.1.36\webapps\ROOT.war
        shell: cmd

      - name: Show webapps
        run: dir apache-tomcat-10.1.36\webapps
        shell: cmd

      - name: Start Tomcat
        run: apache-tomcat-10.1.36\bin\startup.bat
        shell: cmd

      - name: Wait for Tomcat
        run: Start-Sleep -Seconds 20
        shell: powershell

      - name: Show Tomcat logs
        run: Get-ChildItem apache-tomcat-10.1.36\logs ; Get-Content apache-tomcat-10.1.36\logs\*.log
        shell: powershell

      - name: Check Application
        run: curl http://localhost:8080