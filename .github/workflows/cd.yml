name: CD

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: cmd
        run: mvn clean package

      - name: Show target files
        shell: cmd
        run: dir target

      - name: Stop Tomcat
        shell: cmd
        run: |
          taskkill /F /IM java.exe
          exit /b 0

      - name: Deploy
        shell: cmd
        run: |
          copy /Y target\employee-api.war C:\work\apache-tomcat-10.1.36\webapps\employee-api.war

      - name: Start Tomcat
        shell: cmd
        run: |
          C:\work\apache-tomcat-10.1.36\bin\startup.bat