name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build WAR
        shell: cmd
        run: mvn clean package

      - name: Show target
        shell: cmd
        run: dir target

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: employee-api-war
          path: target/employee-api.war