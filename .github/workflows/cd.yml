name: CD (Tomcat Deploy)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      # ① ソース取得
      - name: Checkout
        uses: actions/checkout@v4

      # ② Javaセットアップ（JDK17）
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ③ WARビルド（target/employee-api.war を想定）
      - name: Build WAR
        run: mvn clean package

      # ④ Tomcat ダウンロード＆展開
      - name: Download Tomcat
        shell: cmd
        run: |
          curl -L -o tomcat.zip https://archive.apache.org/dist/tomcat/tomcat-10/v10.1.36/bin/apache-tomcat-10.1.36-windows-x64.zip
          tar -xf tomcat.zip

      # ⑤ WAR配置
      - name: Deploy WAR
        shell: cmd
        run: |
          copy target\employee-api.war apache-tomcat-10.1.36\webapps\

      # ⑥ 配置確認（重要）
      - name: Confirm WAR
        shell: cmd
        run: dir apache-tomcat-10.1.36\webapps

      # ⑦ Tomcat起動（フォアグラウンド＋ログ保存）
      - name: Start Tomcat
        shell: cmd
        run: |
          set "CATALINA_HOME=%CD%\apache-tomcat-10.1.36"
          set "CATALINA_BASE=%CD%\apache-tomcat-10.1.36"
          set "JAVA_HOME=%JAVA_HOME%"

          apache-tomcat-10.1.36\bin\catalina.bat run > tomcat.log 2>&1

      # ⑧ Tomcatログ確認（ここが最重要）
      - name: Show Tomcat log
        shell: cmd
        run: type tomcat.log

      # ⑨ ポート確認（起動確認）
      - name: Check port
        shell: powershell
        run: Test-NetConnection -ComputerName localhost -Port 8080

      # ⑩ アプリ確認（WAR名に対応）
      - name: Check Application
        shell: cmd
        run: curl http://localhost:8080/employee-api/