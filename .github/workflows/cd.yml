name: CD

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: mvn clean package

      - name: Stop Tomcat
        run: taskkill /F /IM java.exe || exit 0

      - name: Deploy
        run: copy /Y target\employee-api-0.0.1-SNAPSHOT.war C:\work\apache-tomcat-10.1.36\webapps\employee-api.war

      - name: Start Tomcat
        run: C:\work\apache-tomcat-10.1.36\bin\startup.bat