name: CD

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # ソース取得
      - name: Checkout
        uses: actions/checkout@v4

      # Maven ビルド
      - name: Build (Maven)
        shell: cmd
        run: |
          mvn clean package

      # Tomcat 停止（安全版）
      - name: Stop Tomcat
        shell: cmd
        run: |
          call C:\work\apache-tomcat-10.1.36\bin\shutdown.bat
          timeout /t 5
          exit /b 0

      # WAR 配置
      - name: Deploy WAR
        shell: cmd
        run: |
          copy /Y target\employee-api-0.0.1-SNAPSHOT.war C:\work\apache-tomcat-10.1.36\webapps\employee-api.war

      # Tomcat 起動
      - name: Start Tomcat
        shell: cmd
        run: |
          call C:\work\apache-tomcat-10.1.36\bin\startup.bat
          timeout /t 10

      # 起動確認（重要）
      - name: Check Tomcat Port
        shell: cmd
        run: |
          netstat -ano | findstr :8080