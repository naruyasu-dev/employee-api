name: CD

on:
  push:
    branches: [ "master", "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (Maven)
        shell: cmd
        run: |
          mvn clean package

      - name: Stop Tomcat
        shell: cmd
        run: |
          C:\work\stop-tomcat.cmd
          timeout /t 5
          exit /b 0

      - name: Deploy WAR
        shell: cmd
        run: |
          copy /Y target\employee-api.war C:\work\apache-tomcat-10.1.36\webapps\employee-api.war

      - name: Start Tomcat
        shell: cmd
        run: |
          start "" C:\work\start-tomcat.cmd

      - name: Wait for Tomcat
        shell: cmd
        run: |
          timeout /t 10

      - name: Check Tomcat Port
        shell: cmd
        run: |
          netstat -ano | findstr :8080