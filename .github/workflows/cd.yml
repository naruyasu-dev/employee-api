name: CD (Tomcat Deploy)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build WAR
        run: mvn clean package

      - name: Download Tomcat
        shell: cmd
        run: |
          curl -L -o tomcat.zip https://archive.apache.org/dist/tomcat/tomcat-10/v10.1.36/bin/apache-tomcat-10.1.36-windows-x64.zip
          tar -xf tomcat.zip

      - name: Deploy WAR
        shell: cmd
        run: |
          copy target\employee-api.war apache-tomcat-10.1.36\webapps\

      - name: Confirm WAR
        shell: cmd
        run: dir apache-tomcat-10.1.36\webapps

      - name: Start Tomcat
        shell: cmd
        run: |
          set "CATALINA_HOME=%CD%\apache-tomcat-10.1.36"
          set "CATALINA_BASE=%CD%\apache-tomcat-10.1.36"
          set "JAVA_HOME=%JAVA_HOME%"
          start "" apache-tomcat-10.1.36\bin\startup.bat

      - name: Wait for Tomcat
        shell: powershell
        run: Start-Sleep -Seconds 20

      - name: Show Tomcat logs
        shell: powershell
        run: |
          Get-ChildItem .\apache-tomcat-10.1.36\logs -ErrorAction SilentlyContinue
          $logs = Get-ChildItem .\apache-tomcat-10.1.36\logs\*.log -ErrorAction SilentlyContinue
          if ($logs) {
            Get-Content $logs
          } else {
            Write-Host "No Tomcat log files found."
          }

      - name: Check port 8080
        shell: powershell
        run: Test-NetConnection -ComputerName localhost -Port 8080

      - name: Check Application
        shell: cmd
        run: curl http://localhost:8080/employee-api/