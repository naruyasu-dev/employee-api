name: CD (Tomcat Deploy)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      # ① ソース取得
      - uses: actions/checkout@v4

      # ② Javaセットアップ
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ③ ビルド（WAR作成）
      - name: Build WAR
        run: mvn clean package

      # ④ Tomcatダウンロード
      - name: Download Tomcat
        run: |
          curl -L -o tomcat.zip https://archive.apache.org/dist/tomcat/tomcat-10/v10.1.36/bin/apache-tomcat-10.1.36-windows-x64.zip
          tar -xf tomcat.zip

      # ⑤ WAR配置
      - name: Deploy WAR to Tomcat
        run: |
          copy target\*.war apache-tomcat-10.1.36\webapps\

      # ⑥ Tomcat起動
      - name: Start Tomcat
        run: |
          set "CATALINA_HOME=%CD%\apache-tomcat-10.1.36"
          set "JAVA_HOME=%JAVA_HOME%"
          call apache-tomcat-10.1.36\bin\startup.bat
        shell: cmd

      # ⑦ 起動待機（←ここ修正ポイント）
      - name: Wait for Tomcat
        run: Start-Sleep -Seconds 10
        shell: powershell

      # ⑧ 動作確認
      - name: Check Application
        run: curl http://localhost:8080